[mypy]
# Lenient baseline ON PURPOSE: mypy on an existing codebase will surface a
# big backlog on the first run, and a gate that floods you with errors is the same
# trap the misplaced ESLint gate just hit. Start lenient, tighten over time.
python_version = 3.10
ignore_missing_imports = True
warn_redundant_casts = True
warn_unused_ignores = True
check_untyped_defs = False
disallow_untyped_defs = False

# To tighten over time: flip check_untyped_defs to True, then scope stricter
# settings to the modules you've annotated first:
#   files = tools, run.py
# and widen as you add annotations.
